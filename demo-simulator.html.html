<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Abkant Demo Simülatör</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 40px;
        }
        button {
            font-size: 1.5em;
            padding: 20px 50px;
            margin: 10px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-bas {
            background: #e94560;
            color: white;
            font-size: 2em;
            padding: 30px 80px;
        }
        .btn-bas:hover { background: #ff6b6b; transform: scale(1.05); }
        .btn-bas:active { transform: scale(0.95); }
        
        .btn-oto {
            background: #00d2ff;
            color: #1a1a2e;
        }
        .btn-oto:hover { background: #33ddff; }
        
        .btn-durdur {
            background: #ffaa00;
            color: #1a1a2e;
        }
        
        .btn-sifirla {
            background: #666;
            color: white;
        }
        
        .bilgi {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 500px;
        }
        .sayac {
            font-size: 5em;
            font-weight: bold;
            color: #e94560;
            margin: 20px;
        }
        .log {
            background: #0a0e17;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            font-size: 0.9em;
        }
        .log-satir {
            padding: 3px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .aktif { color: #00ff88; }
        .durduruldu { color: #ffaa00; }
    </style>
</head>
<body>

    <h1>🔧 ABKANT PRES DEMO SİMÜLATÖR</h1>
    <p>Pedal basımını simüle eder, Firebase'e gerçek veri yazar</p>

    <div class="bilgi">
        <div class="sayac" id="demoSayac">0</div>
        <p>Demo Sayaç</p>
        <p>Durum: <span id="demoDurum" class="durduruldu">DURDURULDU</span></p>
    </div>

    <button class="btn-bas" onclick="pedalaBas()">🦶 PEDALA BAS</button>
    <br><br>
    <button class="btn-oto" onclick="otomatikBaslat()">▶️ OTOMATİK BAŞLAT (Her 2-5 sn)</button>
    <button class="btn-durdur" onclick="otomatikDurdur()">⏸️ DURDUR</button>
    <br><br>
    <button class="btn-sifirla" onclick="sayaciSifirla()">🔄 SAYACI SIFIRLA</button>

    <div class="log" id="logKutusu">
        <div class="log-satir">Hazır... Butona bas veya otomatik başlat.</div>
    </div>

    <script>
        // ========== FIREBASE AYARLARI (KENDİ BİLGİLERİNİ YAZ) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDxxxxxxxxxxxxxxxxxxxxx",
            authDomain: "abkantsayac.firebaseapp.com",
            databaseURL: "https://abkantsayac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkantsayac",
            storageBucket: "abkantsayac.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let demoSayac = 0;
        let otomatikInterval = null;
        const logKutusu = document.getElementById('logKutusu');
        const demoSayacElem = document.getElementById('demoSayac');
        const demoDurumElem = document.getElementById('demoDurum');
        
        // Firebase'den son sayacı oku
        database.ref('/sonSayac').on('value', (snapshot) => {
            if (snapshot.val() !== null) {
                demoSayac = snapshot.val();
                demoSayacElem.textContent = demoSayac;
            }
        });
        
        function simdiZaman() {
            const s = new Date();
            return s.getHours().toString().padStart(2,'0') + ':' + 
                   s.getMinutes().toString().padStart(2,'0') + ':' + 
                   s.getSeconds().toString().padStart(2,'0');
        }
        
        function bugunTarih() {
            const s = new Date();
            return s.getFullYear() + '-' + 
                   (s.getMonth()+1).toString().padStart(2,'0') + '-' + 
                   s.getDate().toString().padStart(2,'0');
        }
        
        function logEkle(mesaj, tip = '') {
            const div = document.createElement('div');
            div.className = 'log-satir ' + tip;
            div.textContent = `[${simdiZaman()}] ${mesaj}`;
            logKutusu.insertBefore(div, logKutusu.firstChild);
        }
        
        function pedalaBas() {
            demoSayac++;
            const zaman = simdiZaman();
            const bugun = bugunTarih();
            
            // Firebase'e yaz (tıpkı Arduino'nun yapacağı gibi)
            const anlikYol = '/kayitlar/' + bugun + '/' + zaman;
            
            database.ref(anlikYol).set(demoSayac);
            database.ref('/gunSonu/' + bugun).set(demoSayac);
            database.ref('/sonSayac').set(demoSayac);
            database.ref('/sonCalismaZamani').set(zaman);
            database.ref('/makineDurum').set('CALISIYOR');
            
            demoSayacElem.textContent = demoSayac;
            logEkle(`🟢 PEDALA BASILDI! Sayaç: ${demoSayac}`, 'aktif');
            
            // Butona basıldığında makine çalışıyor yap, 10 sn sonra beklemede
            clearTimeout(window.beklemeTimeout);
            window.beklemeTimeout = setTimeout(() => {
                database.ref('/makineDurum').set('BEKLEMEDE');
                demoDurumElem.textContent = 'BEKLEMEDE';
                demoDurumElem.className = 'durduruldu';
                logEkle('⏸️ Makine beklemede (10 sn basım yok)');
            }, 10000);
            
            demoDurumElem.textContent = 'ÇALIŞIYOR';
            demoDurumElem.className = 'aktif';
        }
        
        function otomatikBaslat() {
            if (otomatikInterval) return;
            
            logEkle('▶️ OTOMATİK MOD BAŞLATILDI');
            demoDurumElem.textContent = 'OTOMATİK';
            demoDurumElem.className = 'aktif';
            
            // İlk pedal hemen
            pedalaBas();
            
            // Sonra rastgele 2-5 saniye aralıklarla
            otomatikInterval = setInterval(() => {
                pedalaBas();
            }, 2000 + Math.random() * 3000);
        }
        
        function otomatikDurdur() {
            if (otomatikInterval) {
                clearInterval(otomatikInterval);
                otomatikInterval = null;
                logEkle('⏸️ OTOMATİK MOD DURDURULDU');
                demoDurumElem.textContent = 'DURDURULDU';
                demoDurumElem.className = 'durduruldu';
            }
        }
        
        function sayaciSifirla() {
            demoSayac = 0;
            const bugun = bugunTarih();
            database.ref('/sonSayac').set(0);
            database.ref('/gunSonu/' + bugun).set(0);
            database.ref('/makineDurum').set('BEKLEMEDE');
            demoSayacElem.textContent = '0';
            logEkle('🔄 SAYAÇ SIFIRLANDI');
            demoDurumElem.textContent = 'SIFIRLANDI';
            demoDurumElem.className = 'durduruldu';
        }
        
        // Sayfa yüklenince
        console.log('Demo Simülatör Hazır!');
        console.log('Firebase bağlantısı:', firebaseConfig.databaseURL);
    </script>
</body>
</html>
