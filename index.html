<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
        .anlik {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        .sayi { font-size: 8em; font-weight: bold; color: #667eea; }
        .zaman { color: #666; margin-top: 10px; font-size: 1.2em; }
        .pedal-durum { background: #ff6b6b; color: white; border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 1.2em; }
        .bekle-durum { background: #f0f0f0; color: #666; border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 1.2em; }
        .footer { text-align: center; color: white; margin-top: 20px; }
        .guncelleme { text-align: center; color: white; margin-bottom: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Abkant Büküm Makinesi</h1>
        <div class="guncelleme" id="guncelleme">Yükleniyor...</div>
        
        <div class="anlik">
            <h3>🚀 PEDAL SAYACI</h3>
            <div class="sayi" id="pedalSayi">0</div>
            <div class="zaman" id="sonGuncelleme">Veri bekleniyor...</div>
            <div id="pedalDurum" class="bekle-durum">⏳ BEKLEMEDE</div>
        </div>
        <div class="footer">
            Canlı Takip | Her basış anlık güncellenir
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-wX1t7jMkYWG_1NpbDnQsgjVc9khrIVk",
            authDomain: "abkant3-e42bd.firebaseapp.com",
            databaseURL: "https://abkant3-e42bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant3-e42bd",
            storageBucket: "abkant3-e42bd.firebasestorage.app",
            messagingSenderId: "572801351430",
            appId: "1:572801351430:web:c0cf32574991d48b6d2887"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sonDeger = 0;

        // ARDUINO'NUN YAZDIĞI YOL: /pedal
        db.ref('/pedal').on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("Gelen veri:", data);
            
            if (data && data.sayac !== undefined) {
                sonDeger = data.sayac;
                document.getElementById('pedalSayi').innerHTML = sonDeger;
                document.getElementById('guncelleme').innerHTML = `✅ Son güncelleme: ${new Date().toLocaleString('tr-TR')}`;
                document.getElementById('sonGuncelleme').innerHTML = `🕐 ${new Date().toLocaleTimeString('tr-TR')}`;
                
                const durumElem = document.getElementById('pedalDurum');
                durumElem.innerHTML = "✅ PEDAL BASILDI";
                durumElem.className = "pedal-durum";
                
                setTimeout(() => {
                    if (document.getElementById('pedalSayi').innerHTML == sonDeger) {
                        durumElem.innerHTML = "⏳ BEKLEMEDE";
                        durumElem.className = "bekle-durum";
                    }
                }, 2000);
            } else {
                document.getElementById('pedalSayi').innerHTML = '0';
                document.getElementById('guncelleme').innerHTML = 'Veri bekleniyor...';
            }
        });

        // Bağlantı durumu
        db.ref('.info/connected').on('value', (snapshot) => {
            if (snapshot.val()) {
                document.getElementById('guncelleme').innerHTML += ' 🔗 Firebase bağlı';
            }
        });
        
        // Sayfa açılınca son değeri göster
        db.ref('/pedal').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.sayac) {
                document.getElementById('pedalSayi').innerHTML = data.sayac;
                document.getElementById('guncelleme').innerHTML = `✅ Son kayıt: ${data.sayac} - ${new Date().toLocaleString('tr-TR')}`;
            }
        });
    </script>
</body>
</html>
