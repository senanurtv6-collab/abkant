<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .kart {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sayi {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        .durum {
            font-size: 1.5em;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .pedal { background: #ff6b6b; color: white; }
        .inis { background: #4ecdc4; color: white; }
        .bekle { background: #f0f0f0; color: #666; }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🏭 Abkant Büküm Takip Sistemi</h1>
    <div class="container">
        <div class="kart">
            <h2>🚀 PEDAL SAYACI</h2>
            <div class="sayi" id="pedalSayi">0</div>
            <div class="durum" id="pedalDurum">BEKLEMEDE</div>
        </div>
        <div class="kart">
            <h2>📍 İNİŞ SAYACI</h2>
            <div class="sayi" id="inisSayi">0</div>
            <div class="durum" id="inisDurum">BEKLEMEDE</div>
        </div>
    </div>

    <script>
        // YENİ FIREBASE YAPILANDIRMASI (abkant3)
        const firebaseConfig = {
            apiKey: "AIzaSyD-wX1t7jMkYWG_1NpbDnQsgjVc9khrIVk",
            authDomain: "abkant3-e42bd.firebaseapp.com",
            databaseURL: "https://abkant3-e42bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant3-e42bd",
            storageBucket: "abkant3-e42bd.firebasestorage.app",
            messagingSenderId: "572801351430",
            appId: "1:572801351430:web:c0cf32574991d48b6d2887"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Pedal sayacını dinle
        db.ref('/pedal_sayac').on('value', (snapshot) => {
            const deger = snapshot.val() || 0;
            document.getElementById('pedalSayi').innerHTML = deger;
            document.getElementById('pedalDurum').innerHTML = deger > 0 ? "PEDAL BASILDI" : "BEKLEMEDE";
            document.getElementById('pedalDurum').className = "durum " + (deger > 0 ? "pedal" : "bekle");
        });

        // İniş sayacını dinle
        db.ref('/inis_sayac').on('value', (snapshot) => {
            const deger = snapshot.val() || 0;
            document.getElementById('inisSayi').innerHTML = deger;
            document.getElementById('inisDurum').innerHTML = deger > 0 ? "İNİŞ NOKTASI" : "BEKLEMEDE";
            document.getElementById('inisDurum').className = "durum " + (deger > 0 ? "inis" : "bekle");
        });
    </script>
</body>
</html>
