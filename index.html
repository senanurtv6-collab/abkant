<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .kart {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sayi {
            font-size: 8em;
            font-weight: bold;
            color: #667eea;
        }
        .durum {
            font-size: 1.5em;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .pedal-durum { background: #ff6b6b; color: white; }
        .bekle { background: #f0f0f0; color: #666; }
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
        }
        .son-guncelleme {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Abkant Büküm Makinesi</h1>
        <div class="son-guncelleme" id="sonGuncelleme">Yükleniyor...</div>
        
        <div class="kart">
            <h3>🚀 PEDAL SAYACI</h3>
            <div class="sayi" id="pedalSayi">0</div>
            <div class="durum" id="pedalDurum">BEKLEMEDE</div>
        </div>
        <div class="footer">
            Canlı Takip | Abkant Büküm Sistemi
        </div>
    </div>

    <script>
        // Firebase yapılandırması (kendi projenle değiştir)
        const firebaseConfig = {
            apiKey: "AIzaSyD-wX1t7jMkYWG_1NpbDnQsgjVc9khrIVk",
            authDomain: "abkant3-e42bd.firebaseapp.com",
            databaseURL: "https://abkant3-e42bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant3-e42bd",
            storageBucket: "abkant3-e42bd.firebasestorage.app",
            messagingSenderId: "572801351430",
            appId: "1:572801351430:web:c0cf32574991d48b6d2887"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sonDeger = 0;

        db.ref('/pedal').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.sayac) {
                const deger = data.sayac;
                sonDeger = deger;
                document.getElementById('pedalSayi').innerHTML = deger;
                document.getElementById('pedalDurum').innerHTML = "PEDAL BASILDI";
                document.getElementById('pedalDurum').className = "durum pedal-durum";
                
                const zaman = new Date().toLocaleString('tr-TR');
                document.getElementById('sonGuncelleme').innerHTML = `🕐 Son güncelleme: ${zaman}`;
                
                setTimeout(() => {
                    if (document.getElementById('pedalSayi').innerHTML == deger) {
                        document.getElementById('pedalDurum').innerHTML = "BEKLEMEDE";
                        document.getElementById('pedalDurum').className = "durum bekle";
                    }
                }, 3000);
            }
        });
        
        document.getElementById('sonGuncelleme').innerHTML = `🕐 ${new Date().toLocaleString('tr-TR')} - Firebase bağlandı`;
    </script>
</body>
</html>
