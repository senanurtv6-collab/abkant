<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .anlik-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kart {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .kart h3 {
            color: #666;
            margin-bottom: 15px;
        }
        
        .sayi {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
        }
        
        .durum {
            font-size: 2em;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            border-radius: 15px;
        }
        
        .durum-pedal { background: #ff6b6b; color: white; }
        .durum-inis { background: #4ecdc4; color: white; }
        .durum-bekle { background: #f0f0f0; color: #666; }
        
        .gecmis {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .gecmis h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .tarih-secici {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .tarih-secici input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1em;
        }
        
        .tarih-secici button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
        }
        
        .secili-tarih {
            font-size: 1.2em;
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Abkant Büküm Makinesi</h1>
            <p>Anlık ve Günlük Takip Sistemi</p>
        </div>
        
        <div class="anlik-panel">
            <div class="kart">
                <h3>🚀 PEDAL SAYACI</h3>
                <div class="sayi" id="pedalSayi">0</div>
                <div class="durum" id="pedalDurum">BEKLEMEDE</div>
            </div>
            <div class="kart">
                <h3>📍 İNİŞ SAYACI</h3>
                <div class="sayi" id="inisSayi">0</div>
                <div class="durum" id="inisDurum">BEKLEMEDE</div>
            </div>
        </div>
        
        <div class="gecmis">
            <h3>📜 GEÇMİŞ KAYITLAR</h3>
            <div class="tarih-secici">
                <input type="date" id="tarihSecici">
                <button onclick="getirGecmis()">Getir</button>
            </div>
            <div class="secili-tarih" id="seciliTarih">Tarih seçiniz</div>
            <div style="margin-top: 20px;">
                <table id="gecmisTablo">
                    <thead>
                        <tr><th>Pedal Sayısı</th><th>İniş Sayısı</th><th>Toplam</th></tr>
                    </thead>
                    <tbody id="gecmisBody">
                        <tr><td colspan="3">Tarih seçiniz...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJg9wHKTDYq4zogqReiOs1OchC_pfZoho",
            authDomain: "abkant2.firebaseapp.com",
            databaseURL: "https://abkant2-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant2",
            storageBucket: "abkant2.firebasestorage.app",
            messagingSenderId: "476690504709",
            appId: "1:476690504709:web:4a2f0dbfa8b49ae29ad06c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Anlık verileri dinle
        function anlikVeri() {
            const anlikRef = db.ref('/anlik');
            anlikRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('pedalSayi').innerHTML = data.pedal || 0;
                    document.getElementById('inisSayi').innerHTML = data.inis || 0;
                    
                    const pedalDurum = data.pedalDurum || "BEKLE";
                    const inisDurum = data.inisDurum || "BEKLE";
                    
                    const pedalElem = document.getElementById('pedalDurum');
                    const inisElem = document.getElementById('inisDurum');
                    
                    pedalElem.innerHTML = pedalDurum;
                    inisElem.innerHTML = inisDurum;
                    
                    pedalElem.className = "durum " + (pedalDurum === "PEDAL" ? "durum-pedal" : "durum-bekle");
                    inisElem.className = "durum " + (inisDurum === "INIS" ? "durum-inis" : "durum-bekle");
                }
            });
        }
        
        // Seçilen tarihin verilerini getir
        function getirGecmis() {
            const tarih = document.getElementById('tarihSecici').value;
            if (!tarih) {
                alert('Lütfen bir tarih seçin!');
                return;
            }
            
            document.getElementById('seciliTarih').innerHTML = `📅 Seçilen Tarih: ${tarih}`;
            
            const gunlukRef = db.ref(`/gunluk/${tarih}`);
            gunlukRef.once('value', (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('gecmisBody');
                
                if (data) {
                    const pedal = data.pedal || 0;
                    const inis = data.inis || 0;
                    tbody.innerHTML = `
                        <tr><td><strong>${pedal}</strong></td><td><strong>${inis}</strong></td><td><strong>${pedal + inis}</strong></td></tr>
                    `;
                } else {
                    tbody.innerHTML = `<tr><td colspan="3">Bu tarihe ait kayıt bulunamadı</td></tr>`;
                }
            });
        }
        
        // Bugünün tarihini input'a set et
        function bugunTarihSet() {
            const bugun = new Date();
            const yil = bugun.getFullYear();
            const ay = String(bugun.getMonth() + 1).padStart(2, '0');
            const gun = String(bugun.getDate()).padStart(2, '0');
            document.getElementById('tarihSecici').value = `${yil}-${ay}-${gun}`;
        }
        
        bugunTarihSet();
        anlikVeri();
    </script>
</body>
</html>
