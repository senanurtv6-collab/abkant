<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .anlik-panel {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .kart {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .kart h3 {
            color: #666;
            margin-bottom: 15px;
        }
        .sayi {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
        }
        .durum {
            font-size: 1.2em;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .pedal-durum { background: #ff6b6b; color: white; }
        .bekle { background: #f0f0f0; color: #666; }
        
        .gecmis {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .gecmis h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .detay {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .detay h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .detay-listesi {
            list-style: none;
            padding: 0;
        }
        .detay-listesi li {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
        }
        .detay-listesi li:nth-child(even) {
            background: #f0f0f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        th:hover {
            background: #5a67d8;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        .serial-panel {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 10px;
            margin-top: 20px;
            color: #0f0;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }
        .sil-btn {
            background: #ff6b6b;
        }
        .son-deger {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }
        .tarih-secici {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .tarih-secici input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            flex: 1;
        }
        .guncel-saat {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Abkant Büküm Takip Sistemi</h1>
        <div class="guncel-saat" id="guncelSaat"></div>
        
        <div style="text-align: center;">
            <button id="baglanBtn">🔌 SERIAL BAĞLAN</button>
            <button id="temizleBtn" class="sil-btn">🗑 GEÇMİŞİ TEMİZLE</button>
        </div>
        
        <div class="anlik-panel">
            <div class="kart">
                <h3>🚀 PEDAL SAYACI</h3>
                <div class="sayi" id="pedalSayi">0</div>
                <div class="durum" id="pedalDurum">BEKLEMEDE</div>
                <div class="son-deger" id="pedalSon">Son kayıt: -</div>
            </div>
        </div>
        
        <div class="gecmis">
            <h3>📜 GEÇMİŞ KAYITLAR</h3>
            <div class="tarih-secici">
                <input type="date" id="tarihSecici">
                <button onclick="getirGecmis()">📅 GÖSTER</button>
            </div>
            
            <table id="gecmisTablo">
                <thead>
                    <tr>
                        <th onclick="siralaByTarih()">Tarih 📅</th>
                        <th>Pedal Sayısı</th>
                        <th>📋 Detay</th>
                    </tr>
                </thead>
                <tbody id="gecmisBody">
                    <tr><td colspan="3">Henüz kayıt yok</td></tr>
                </tbody>
            </table>
            
            <div id="detayPanel" class="detay" style="display:none;">
                <h4 id="detayTarih"></h4>
                <ul id="detayListesi" class="detay-listesi"></ul>
            </div>
        </div>
        
        <div class="serial-panel" id="serialPanel">
            <div id="serialLog">⏳ Bağlanmak için yukarıdaki butona tıkla...</div>
        </div>
    </div>

    <script>
        let port = null;
        let reader = null;
        let gunlukVeri = {};
        let sonPedalDegeri = 0;
        
        // Canlı saat gösterimi
        function updateClock() {
            const now = new Date();
            document.getElementById('guncelSaat').innerHTML = `🕐 ${now.toLocaleString('tr-TR')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        function yukleGecmis() {
            const kayitli = localStorage.getItem('abkant_gecmis_v6');
            if (kayitli) {
                gunlukVeri = JSON.parse(kayitli);
                // SON DEĞERİ GÖSTER
                const bugun = new Date().toISOString().split('T')[0];
                if (gunlukVeri[bugun] && gunlukVeri[bugun].pedal) {
                    sonPedalDegeri = gunlukVeri[bugun].pedal;
                    document.getElementById('pedalSayi').innerHTML = sonPedalDegeri;
                    document.getElementById('pedalSon').innerHTML = `Son kayıt: ${sonPedalDegeri}`;
                } else {
                    // Başka bir günün son değerini bul (en son gün)
                    const tarihler = Object.keys(gunlukVeri).sort().reverse();
                    if (tarihler.length > 0) {
                        const sonGun = tarihler[0];
                        sonPedalDegeri = gunlukVeri[sonGun].pedal || 0;
                        document.getElementById('pedalSayi').innerHTML = sonPedalDegeri;
                        document.getElementById('pedalSon').innerHTML = `Son kayıt: ${sonPedalDegeri} (${sonGun})`;
                    }
                }
            } else {
                gunlukVeri = {};
                document.getElementById('pedalSayi').innerHTML = '0';
                document.getElementById('pedalSon').innerHTML = 'Son kayıt: -';
            }
            gecmisListele();
        }
        
        function kaydetGecmis() {
            localStorage.setItem('abkant_gecmis_v6', JSON.stringify(gunlukVeri));
        }
        
        function veriGuncelle(deger, simdikiZaman = null) {
            const now = simdikiZaman ? new Date(simdikiZaman) : new Date();
            const bugun = now.toISOString().split('T')[0];
            const saatStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if (!gunlukVeri[bugun]) {
                gunlukVeri[bugun] = { pedal: 0, basimlar: [] };
            }
            
            // Sadece yeni basım ise (değer arttıysa) kaydet
            if (deger > (gunlukVeri[bugun].pedal || 0)) {
                gunlukVeri[bugun].basimlar.push({
                    sayac: deger,
                    saat: saatStr,
                    tamZaman: now.toISOString()
                });
            }
            
            gunlukVeri[bugun].pedal = deger;
            sonPedalDegeri = deger;
            
            // EKRANI GÜNCELLE - BURASI ÇOK ÖNEMLİ!
            document.getElementById('pedalSayi').innerHTML = deger;
            document.getElementById('pedalDurum').innerHTML = "PEDAL BASILDI";
            document.getElementById('pedalDurum').className = "durum pedal-durum";
            document.getElementById('pedalSon').innerHTML = `Son kayıt: ${deger} (${saatStr})`;
            
            kaydetGecmis();
            gecmisListele();
            
            setTimeout(() => {
                if (document.getElementById('pedalDurum').innerHTML === "PEDAL BASILDI") {
                    document.getElementById('pedalDurum').innerHTML = "BEKLEMEDE";
                    document.getElementById('pedalDurum').className = "durum bekle";
                }
            }, 2000);
        }
        
        function gecmisListele() {
            const tbody = document.getElementById('gecmisBody');
            tbody.innerHTML = '';
            const tarihler = Object.keys(gunlukVeri).sort().reverse();
            for (let tarih of tarihler) {
                const veri = gunlukVeri[tarih];
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = tarih;
                row.insertCell(1).innerHTML = veri.pedal || 0;
                const detayBtn = document.createElement('button');
                detayBtn.innerHTML = '📋 Detay';
                detayBtn.onclick = (function(t) { return function() { detayGoster(t); }; })(tarih);
                const huc = row.insertCell(2);
                huc.appendChild(detayBtn);
            }
            if (tarihler.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Henüz kayıt yok</td></tr>';
            }
        }
        
        function detayGoster(tarih) {
            const veri = gunlukVeri[tarih];
            const panel = document.getElementById('detayPanel');
            const basimlar = veri?.basimlar || [];
            
            document.getElementById('detayTarih').innerHTML = `📅 ${tarih} - Toplam ${basimlar.length} basım`;
            const liste = document.getElementById('detayListesi');
            liste.innerHTML = '';
            
            if (basimlar.length === 0) {
                liste.innerHTML = '<li>Bu güne ait basım kaydı yok</li>';
            } else {
                for (let b of basimlar) {
                    const li = document.createElement('li');
                    li.innerHTML = `🕐 ${b.saat} - ${b.sayac}. basım`;
                    liste.appendChild(li);
                }
            }
            panel.style.display = 'block';
            panel.scrollIntoView({ behavior: 'smooth' });
        }
        
        function getirGecmis() {
            const secilen = document.getElementById('tarihSecici').value;
            if (!secilen) return;
            detayGoster(secilen);
        }
        
        function siralaByTarih() {
            const tbody = document.getElementById('gecmisBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            rows.sort((a, b) => {
                const tarihA = a.cells[0].innerText;
                const tarihB = b.cells[0].innerText;
                return tarihB.localeCompare(tarihA);
            });
            tbody.innerHTML = '';
            rows.forEach(row => tbody.appendChild(row));
        }
        
        const bugun = new Date().toISOString().split('T')[0];
        document.getElementById('tarihSecici').value = bugun;
        
        async function baglan() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const logElem = document.getElementById('serialLog');
                logElem.innerHTML = '✅ Bağlandı! Veriler alınıyor...\n';
                
                // Bağlanınca son değeri göster
                yukleGecmis();
                
                reader = port.readable.getReader();
                serialOku();
            } catch (err) {
                document.getElementById('serialLog').innerHTML = '❌ Hata: ' + err.message + '\n';
            }
        }
        
        async function serialOku() {
            let buffer = "";
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += new TextDecoder().decode(value);
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('{') && line.endsWith('}')) {
                            try {
                                const veri = JSON.parse(line);
                                const logElem = document.getElementById('serialLog');
                                logElem.innerHTML += '📡 ' + line + '\n';
                                logElem.scrollTop = logElem.scrollHeight;
                                
                                if (veri.type === 'pedal') {
                                    veriGuncelle(veri.value);
                                }
                            } catch(e) {}
                        } else if (line.startsWith('Pedal:')) {
                            // Eski format için
                            const match = line.match(/Pedal:\s*(\d+)/);
                            if (match) {
                                veriGuncelle(parseInt(match[1]));
                            }
                        }
                    }
                }
            } catch (err) {
                document.getElementById('serialLog').innerHTML += '❌ Okuma hatası\n';
            }
        }
        
        function temizleGecmis() {
            if (confirm('Tüm geçmiş kayıtlar silinecek. Devam et?')) {
                localStorage.removeItem('abkant_gecmis_v6');
                gunlukVeri = {};
                sonPedalDegeri = 0;
                gecmisListele();
                document.getElementById('serialLog').innerHTML += '🗑 Geçmiş kayıtlar silindi.\n';
                document.getElementById('pedalSayi').innerHTML = '0';
                document.getElementById('pedalSon').innerHTML = 'Son kayıt: -';
                document.getElementById('detayPanel').style.display = 'none';
            }
        }
        
        document.getElementById('baglanBtn').addEventListener('click', baglan);
        document.getElementById('temizleBtn').addEventListener('click', temizleGecmis);
        
        if (!("serial" in navigator)) {
            document.getElementById('baglanBtn').disabled = true;
            document.getElementById('serialLog').innerHTML = '❌ Web Serial desteklenmiyor. Chrome kullanın.\n';
        }
        
        yukleGecmis();
    </script>
</body>
</html>
