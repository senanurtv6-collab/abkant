<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .anlik-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kart {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .kart h3 {
            color: #666;
            margin-bottom: 15px;
        }
        .sayi {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
        }
        .durum {
            font-size: 1.2em;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .pedal-durum { background: #ff6b6b; color: white; }
        .inis-durum { background: #4ecdc4; color: white; }
        .bekle { background: #f0f0f0; color: #666; }
        
        .gecmis {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .gecmis h3 {
            margin-bottom: 15px;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        .serial-panel {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 10px;
            margin-top: 20px;
            color: #0f0;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }
        .sil-btn {
            background: #ff6b6b;
        }
        .durum-text {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Abkant Büküm Takip Sistemi</h1>
        
        <div style="text-align: center;">
            <button id="baglanBtn">🔌 SERIAL BAĞLAN</button>
            <button id="temizleBtn" class="sil-btn">🗑 GEÇMİŞİ TEMİZLE</button>
        </div>
        
        <div class="anlik-panel">
            <div class="kart">
                <h3>🚀 PEDAL SAYACI</h3>
                <div class="sayi" id="pedalSayi">0</div>
                <div class="durum" id="pedalDurum">BEKLEMEDE</div>
            </div>
            <div class="kart">
                <h3>📍 İNİŞ SAYACI</h3>
                <div class="sayi" id="inisSayi">0</div>
                <div class="durum" id="inisDurum">BEKLEMEDE</div>
            </div>
        </div>
        
        <div class="gecmis">
            <h3>📜 GEÇMİŞ KAYITLAR (Tarayıcıda Saklanır)</h3>
            <div>
                <input type="date" id="tarihSecici">
                <button onclick="getirGecmis()">📅 GÖSTER</button>
            </div>
            <div style="margin-top: 20px;">
                <table id="gecmisTablo">
                    <thead><tr><th>Tarih</th><th>Pedal</th><th>İniş</th><th>Toplam</th></tr></thead>
                    <tbody id="gecmisBody">
                        <tr><td colspan="4">Henüz kayıt yok</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="serial-panel" id="serialPanel">
            <div id="serialLog">⏳ Bağlanmak için yukarıdaki butona tıkla...</div>
        </div>
    </div>

    <script>
        let port = null;
        let reader = null;
        let gunlukVeri = {};
        
        // LocalStorage'dan geçmiş kayıtları yükle
        function yukleGecmis() {
            const kayitli = localStorage.getItem('abkant_gecmis');
            if (kayitli) {
                gunlukVeri = JSON.parse(kayitli);
            } else {
                gunlukVeri = {};
            }
            gecmisListele();
        }
        
        // Geçmişi kaydet
        function kaydetGecmis() {
            localStorage.setItem('abkant_gecmis', JSON.stringify(gunlukVeri));
        }
        
        // Veri ekle/güncelle
        function veriGuncelle(tur, deger) {
            const bugun = new Date().toISOString().split('T')[0];
            if (!gunlukVeri[bugun]) {
                gunlukVeri[bugun] = { pedal: 0, inis: 0 };
            }
            if (tur === 'pedal') {
                gunlukVeri[bugun].pedal = deger;
                document.getElementById('pedalSayi').innerHTML = deger;
                document.getElementById('pedalDurum').innerHTML = "PEDAL BASILDI";
                document.getElementById('pedalDurum').className = "durum pedal-durum";
            } else if (tur === 'inis') {
                gunlukVeri[bugun].inis = deger;
                document.getElementById('inisSayi').innerHTML = deger;
                document.getElementById('inisDurum').innerHTML = "İNİŞ NOKTASI";
                document.getElementById('inisDurum').className = "durum inis-durum";
            }
            kaydetGecmis();
            gecmisListele();
            
            // 2 saniye sonra durumu BEKLEMEDE yap
            setTimeout(() => {
                document.getElementById('pedalDurum').innerHTML = "BEKLEMEDE";
                document.getElementById('pedalDurum').className = "durum bekle";
                document.getElementById('inisDurum').innerHTML = "BEKLEMEDE";
                document.getElementById('inisDurum').className = "durum bekle";
            }, 2000);
        }
        
        // Geçmiş listeleyici
        function gecmisListele() {
            const tbody = document.getElementById('gecmisBody');
            tbody.innerHTML = '';
            const tarihler = Object.keys(gunlukVeri).sort().reverse();
            for (let tarih of tarihler) {
                const veri = gunlukVeri[tarih];
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = tarih;
                row.insertCell(1).innerHTML = veri.pedal || 0;
                row.insertCell(2).innerHTML = veri.inis || 0;
                row.insertCell(3).innerHTML = (veri.pedal || 0) + (veri.inis || 0);
            }
            if (tarihler.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Henüz kayıt yok</td></tr>';
            }
        }
        
        function getirGecmis() {
            const secilen = document.getElementById('tarihSecici').value;
            if (!secilen) return;
            const veri = gunlukVeri[secilen];
            const tbody = document.getElementById('gecmisBody');
            if (veri) {
                tbody.innerHTML = `<tr><td>${secilen}</td><td>${veri.pedal || 0}</td><td>${veri.inis || 0}</td><td>${(veri.pedal || 0) + (veri.inis || 0)}</td></tr>`;
            } else {
                tbody.innerHTML = '<tr><td colspan="4">Bu tarihe ait kayıt yok</td></tr>';
            }
        }
        
        // Bugünün tarihini set et
        const bugun = new Date().toISOString().split('T')[0];
        document.getElementById('tarihSecici').value = bugun;
        
        // SERIAL BAĞLANTI
        async function baglan() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const logElem = document.getElementById('serialLog');
                logElem.innerHTML = '✅ Bağlandı! Sensör verileri bekleniyor...\n';
                
                reader = port.readable.getReader();
                serialOku();
            } catch (err) {
                document.getElementById('serialLog').innerHTML = '❌ Hata: ' + err.message + '\n';
            }
        }
        
        async function serialOku() {
            let buffer = "";
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += new TextDecoder().decode(value);
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('{') && line.endsWith('}')) {
                            try {
                                const veri = JSON.parse(line);
                                const logElem = document.getElementById('serialLog');
                                logElem.innerHTML += '📡 ' + line + '\n';
                                logElem.scrollTop = logElem.scrollHeight;
                                
                                if (veri.type === 'pedal') {
                                    veriGuncelle('pedal', veri.value);
                                } else if (veri.type === 'inis') {
                                    veriGuncelle('inis', veri.value);
                                }
                            } catch(e) {
                                console.log('JSON parse hatası:', line);
                            }
                        }
                    }
                }
            } catch (err) {
                document.getElementById('serialLog').innerHTML += '❌ Okuma hatası: ' + err.message + '\n';
            }
        }
        
        function temizleGecmis() {
            if (confirm('Tüm geçmiş kayıtlar silinecek. Devam et?')) {
                localStorage.removeItem('abkant_gecmis');
                gunlukVeri = {};
                gecmisListele();
                document.getElementById('serialLog').innerHTML += '🗑 Geçmiş kayıtlar silindi.\n';
                document.getElementById('pedalSayi').innerHTML = '0';
                document.getElementById('inisSayi').innerHTML = '0';
            }
        }
        
        document.getElementById('baglanBtn').addEventListener('click', baglan);
        document.getElementById('temizleBtn').addEventListener('click', temizleGecmis);
        
        if (!("serial" in navigator)) {
            document.getElementById('baglanBtn').disabled = true;
            document.getElementById('serialLog').innerHTML = '❌ Web Serial desteklenmiyor. Chrome kullanın.\n';
        }
        
        yukleGecmis();
    </script>
</body>
</html>
