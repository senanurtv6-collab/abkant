<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .status-text {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
        }
        
        .bekle { background: #f0f0f0; color: #666; }
        .pedal { background: #ff6b6b; color: white; }
        .inis { background: #4ecdc4; color: white; }
        .ikisi { background: #ff9f43; color: white; }
        
        .time-info {
            font-size: 1.2em;
            color: #666;
            margin-top: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .history {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .history h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1em;
        }
        
        .refresh-btn:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 Abkant Büküm Makinesi</h1>
            <p>Gerçek Zamanlı Takip Sistemi</p>
        </div>
        
        <div class="status-card">
            <h2>📊 Anlık Durum</h2>
            <div class="status-text" id="durumText">Yükleniyor...</div>
            <div class="time-info" id="zamanText"></div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>📌 Bugünkü Pedal Sayısı</h3>
                <div class="stat-number" id="bugunPedal">0</div>
            </div>
            <div class="stat-card">
                <h3>📍 Bugünkü İniş Sayısı</h3>
                <div class="stat-number" id="bugunInis">0</div>
            </div>
            <div class="stat-card">
                <h3>📅 Bugünün Tarihi</h3>
                <div class="stat-number" id="bugunTarih">-</div>
            </div>
        </div>
        
        <div class="history">
            <h3>📜 Geçmiş Günlerin Kayıtları</h3>
            <div id="historyTable">
                <table>
                    <thead>
                        <tr><th>Tarih</th><th>Pedal Sayısı</th><th>İniş Sayısı</th><th>Toplam</th></tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="4">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
            <button class="refresh-btn" onclick="loadHistory()">🔄 Yenile</button>
        </div>
    </div>

    <script>
        // Firebase yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyDQKdx1xVWC3xj2R8Q8eGgDoou_3zP3rn8",
            authDomain: "abkant-9a6e9.firebaseapp.com",
            databaseURL: "https://abkant-9a6e9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant-9a6e9",
            storageBucket: "abkant-9a6e9.firebasestorage.app",
            messagingSenderId: "1044501986885",
            appId: "1:1044501986885:web:0e2aa3ffcb28cc7564ad2c"
        };

        // Firebase'i başlat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Anlık durumu dinle
        function loadAnlik() {
            const anlikRef = database.ref('/anlik');
            anlikRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const durum = data.durum || 'BEKLE';
                    const durumText = document.getElementById('durumText');
                    durumText.innerHTML = durum;
                    
                    // CSS sınıfını güncelle
                    durumText.className = 'status-text';
                    if (durum === 'PEDAL') durumText.classList.add('pedal');
                    else if (durum === 'INIS') durumText.classList.add('inis');
                    else if (durum === 'IKISI') durumText.classList.add('ikisi');
                    else durumText.classList.add('bekle');
                    
                    document.getElementById('zamanText').innerHTML = 
                        `🕐 ${data.saat || '-'} | 📅 ${data.tarih || '-'}`;
                }
            });
        }

        // Bugünün verilerini al
        function loadBugun() {
            const bugun = new Date();
            const tarih = bugun.getFullYear() + '-' + 
                         String(bugun.getMonth() + 1).padStart(2, '0') + '-' + 
                         String(bugun.getDate()).padStart(2, '0');
            
            document.getElementById('bugunTarih').innerHTML = tarih;
            
            const gunlukRef = database.ref('/gunluk/' + tarih);
            gunlukRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('bugunPedal').innerHTML = data.pedal || 0;
                    document.getElementById('bugunInis').innerHTML = data.inis || 0;
                } else {
                    document.getElementById('bugunPedal').innerHTML = '0';
                    document.getElementById('bugunInis').innerHTML = '0';
                }
            });
        }

        // Geçmiş günleri yükle
        function loadHistory() {
            const gunlukRef = database.ref('/gunluk');
            gunlukRef.once('value', (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';
                
                if (data) {
                    const gunler = Object.keys(data).sort().reverse();
                    for (let gun of gunler) {
                        const row = tbody.insertRow();
                        row.insertCell(0).innerHTML = gun;
                        row.insertCell(1).innerHTML = data[gun].pedal || 0;
                        row.insertCell(2).innerHTML = data[gun].inis || 0;
                        row.insertCell(3).innerHTML = (data[gun].pedal || 0) + (data[gun].inis || 0);
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="4">Henüz kayıt yok</td></tr>';
                }
            });
        }

        // Sayfa yüklendiğinde çalışacaklar
        loadAnlik();
        loadBugun();
        loadHistory();
        
        // Her dakika bugünü yenile
        setInterval(loadBugun, 60000);
    </script>
</body>
</html>
