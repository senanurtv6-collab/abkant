<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .kart {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sayi {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        .durum {
            font-size: 1.5em;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .pedal { background: #ff6b6b; color: white; }
        .inis { background: #4ecdc4; color: white; }
        .bekle { background: #f0f0f0; color: #666; }
        h1 { color: white; text-align: center; }
    </style>
</head>
<body>
    <h1>🏭 Abkant Büküm Takip Sistemi</h1>
    <div class="container">
        <div class="kart">
            <h2>🚀 PEDAL SAYACI</h2>
            <div class="sayi" id="pedalSayi">0</div>
            <div class="durum" id="pedalDurum">BEKLEMEDE</div>
        </div>
        <div class="kart">
            <h2>📍 İNİŞ SAYACI</h2>
            <div class="sayi" id="inisSayi">0</div>
            <div class="durum" id="inisDurum">BEKLEMEDE</div>
        </div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "Buraya Web App'ten aldığın apiKey'i yaz",
  authDomain: "abkant3.firebaseapp.com",
  databaseURL: "https://abkant3-default-rtdb.europe-west3.firebasedatabase.app",
  projectId: "abkant3",
  storageBucket: "abkant3.firebasestorage.app",
  messagingSenderId: "Buraya Web App'ten aldığın Sender ID'yi yaz",
  appId: "Buraya Web App'ten aldığın App ID'yi yaz"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('/pedal_sayac').on('value', (snapshot) => {
            document.getElementById('pedalSayi').innerHTML = snapshot.val() || 0;
        });

        db.ref('/inis_sayac').on('value', (snapshot) => {
            document.getElementById('inisSayi').innerHTML = snapshot.val() || 0;
        });
    </script>
</body>
</html>
