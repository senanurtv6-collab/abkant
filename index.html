<!DOCTYPE html>
<html>
<head>
    <title>Abkant Büküm Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 10px; }
        .anlik {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .sayi { font-size: 6em; font-weight: bold; color: #667eea; }
        .pedal-durum { background: #ff6b6b; color: white; border-radius: 10px; padding: 10px; margin-top: 10px; }
        .bekle-durum { background: #f0f0f0; color: #666; border-radius: 10px; padding: 10px; margin-top: 10px; }
        
        .ozet { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; cursor: pointer; }
        button { background: #667eea; color: white; border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; }
        .detay { background: #f9f9f9; border-radius: 15px; padding: 15px; margin-top: 15px; max-height: 350px; overflow-y: auto; }
        .detay-listesi { list-style: none; padding: 0; }
        .detay-listesi li { padding: 8px; border-bottom: 1px solid #ddd; font-family: monospace; }
        .tarih-secici { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .tarih-secici input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; flex: 1; }
        .footer { text-align: center; color: white; margin-top: 20px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Abkant Büküm Makinesi</h1>
        
        <div class="anlik">
            <h3>🚀 ANLIK PEDAL SAYACI</h3>
            <div class="sayi" id="anlikSayac">0</div>
            <div id="anlikDurum" class="bekle-durum">⏳ BEKLEMEDE</div>
        </div>
        
        <div class="ozet">
            <h3>📊 GÜNLÜK ÖZET</h3>
            <div class="tarih-secici">
                <input type="date" id="tarihSecici">
                <button onclick="getirOzet()">📅 GÖSTER</button>
            </div>
            <table id="ozetTablo">
                <thead><tr><th>Tarih</th><th>Toplam Pedal</th><th>Detay</th></tr></thead>
                <tbody id="ozetBody"><tr><td colspan="3">Yükleniyor...</td></tr></tbody>
            </table>
        </div>
        
        <div id="detayPanel" class="detay" style="display:none;">
            <h4 id="detayTarih"></h4>
            <ul id="detayListesi" class="detay-listesi"></ul>
        </div>
        <div class="footer">Canlı Takip | Her basış anlık kaydedilir</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-wX1t7jMkYWG_1NpbDnQsgjVc9khrIVk",
            authDomain: "abkant3-e42bd.firebaseapp.com",
            databaseURL: "https://abkant3-e42bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "abkant3-e42bd",
            storageBucket: "abkant3-e42bd.firebasestorage.app",
            messagingSenderId: "572801351430",
            appId: "1:572801351430:web:c0cf32574991d48b6d2887"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let sonDeger = 0;
        let basimListesi = [];  // Her basımı (sayac, zaman) olarak tut
        
        // Anlık veri
        db.ref('/pedal').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.sayac !== undefined) {
                const deger = data.sayac;
                sonDeger = deger;
                document.getElementById('anlikSayac').innerHTML = deger;
                document.getElementById('anlikDurum').innerHTML = "✅ PEDAL BASILDI";
                document.getElementById('anlikDurum').className = "pedal-durum";
                
                // YENİ BASIM: web'den saat ekle
                if (deger > (basimListesi[basimListesi.length-1]?.sayac || 0)) {
                    const simdi = new Date();
                    const saat = simdi.toLocaleTimeString('tr-TR');
                    basimListesi.push({ sayac: deger, saat: saat });
                    kaydetBasimlar();  // LocalStorage'a kaydet
                    ozetListele();      // Özeti yenile
                }
                
                setTimeout(() => {
                    if (document.getElementById('anlikSayac').innerHTML == deger) {
                        document.getElementById('anlikDurum').innerHTML = "⏳ BEKLEMEDE";
                        document.getElementById('anlikDurum').className = "bekle-durum";
                    }
                }, 2000);
            }
        });
        
        function kaydetBasimlar() {
            const bugun = new Date().toISOString().split('T')[0];
            const kayitli = localStorage.getItem('abkant_basimlar_' + bugun);
            let mevcut = kayitli ? JSON.parse(kayitli) : [];
            
            // Yeni basımları ekle
            for (let b of basimListesi) {
                if (!mevcut.some(m => m.sayac === b.sayac)) {
                    mevcut.push(b);
                }
            }
            localStorage.setItem('abkant_basimlar_' + bugun, JSON.stringify(mevcut));
        }
        
        function basimlariYukle(tarih) {
            const kayitli = localStorage.getItem('abkant_basimlar_' + tarih);
            return kayitli ? JSON.parse(kayitli) : [];
        }
        
        function ozetListele() {
            const tbody = document.getElementById('ozetBody');
            tbody.innerHTML = '';
            
            // LocalStorage'daki tüm günleri bul
            const gunler = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('abkant_basimlar_')) {
                    const tarih = key.replace('abkant_basimlar_', '');
                    const basimlar = JSON.parse(localStorage.getItem(key));
                    const toplam = basimlar.length > 0 ? Math.max(...basimlar.map(b => b.sayac)) : 0;
                    gunler.push({ tarih, toplam, basimlar });
                }
            }
            
            gunler.sort((a, b) => b.tarih.localeCompare(a.tarih));
            
            if (gunler.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Henüz kayıt yok</td></tr>';
                return;
            }
            
            for (let g of gunler) {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = g.tarih;
                row.insertCell(1).innerHTML = g.toplam;
                const btn = document.createElement('button');
                btn.innerHTML = '📋 Detay';
                btn.onclick = (function(t, b) { return function() { detayGoster(t, b); }; })(g.tarih, g.basimlar);
                const cell = row.insertCell(2);
                cell.appendChild(btn);
            }
        }
        
        function detayGoster(tarih, basimlar) {
            const panel = document.getElementById('detayPanel');
            const liste = document.getElementById('detayListesi');
            
            document.getElementById('detayTarih').innerHTML = `📅 ${tarih} - Basım Detayları (Toplam: ${basimlar.length} basım)`;
            liste.innerHTML = '';
            
            if (basimlar.length === 0) {
                liste.innerHTML = '<li>Bu güne ait basım kaydı yok</li>';
            } else {
                basimlar.sort((a, b) => a.sayac - b.sayac);
                for (let b of basimlar) {
                    const li = document.createElement('li');
                    li.innerHTML = `🕐 ${b.saat} - ${b.sayac}. basım`;
                    liste.appendChild(li);
                }
            }
            panel.style.display = 'block';
            panel.scrollIntoView({ behavior: 'smooth' });
        }
        
        function getirOzet() {
            const secilen = document.getElementById('tarihSecici').value;
            if (secilen) {
                const basimlar = basimlariYukle(secilen);
                detayGoster(secilen, basimlar);
            }
        }
        
        document.getElementById('tarihSecici').value = new Date().toISOString().split('T')[0];
        ozetListele();
        
        setInterval(() => { ozetListele(); }, 5000);
    </script>
</body>
</html>
